name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Package

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Build package
      run: uv build

    - name: Verify package
      run: |
        pip install twine
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist-packages
        path: dist/

  create-github-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: build

    steps:
    - uses: actions/checkout@v6

    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: dist-packages
        path: dist/

    - name: Get tag name
      id: tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      id: create-release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        release_name: Release ${{ steps.tag.outputs.tag }}
        body: |
          ## Changes in ${{ steps.tag.outputs.tag }}

          ### Installation

          Install from PyPI:
          ```bash
          pip install robot-tool-mcp
          ```

          Or with uvx:
          ```bash
          uvx robot-tool-mcp
          ```

          ### Usage

          See the [README](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.tag }}/README.md) for usage instructions.

          ### What's New

          Please see the commit history for detailed changes in this release.
        draft: false
        prerelease: false

  publish:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: dist-packages
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
